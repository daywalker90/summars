name: Latest release on CLN v25.12.x

on:
    release:
        types: [published, edited]
    workflow_dispatch:

jobs:
    call-ci:
        uses: ./.github/workflows/ci.yml
        with:
            cln-version: "v25.12.1"
            pyln-version: "25.12.1"
            tagged-release: true
            python-version-1: "3.10"
            python-version-2: "3.12"
