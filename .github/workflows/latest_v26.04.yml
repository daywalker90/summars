name: Latest release on CLN v26.04.x

on:
    release:
        types: [published, edited]
    workflow_dispatch:

jobs:
    call-ci:
        uses: ./.github/workflows/ci.yml
        with:
            cln-version: "v26.04"
            pyln-version: "26.4"
            tagged-release: true
            python-version-1: "3.10"
            python-version-2: "3.12"
